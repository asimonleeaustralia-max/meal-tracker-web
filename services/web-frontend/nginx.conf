server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy /api/* to the gateway so the browser can use same-origin requests.
    # The API_GATEWAY_URL env var is substituted at container start (see entrypoint).
    location /api/ {
        resolver           168.63.129.16 valid=30s;
        proxy_ssl_server_name on;
        proxy_ssl_name     $proxy_host;
        proxy_pass         ${API_GATEWAY_URL}/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_request_buffering off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caching for static assets
    location ~* \.(?:css|js|png|jpg|jpeg|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
